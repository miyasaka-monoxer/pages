<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最長増加部分列 計算機</title>
  <meta property="og:title" content="最長増加部分列 計算機">
  <meta property="og:description" content="数列を入力すると、最長増加部分列（Longest Increasing Subsequence）の長さを計算します。">
  <meta property="og:type" content="website">
  <meta name="description" content="数列を入力すると、最長増加部分列（Longest Increasing Subsequence）の長さを計算します。">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5a67d8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LIS計算機">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    #installBanner {
      display: none;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #c3dafe;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 480px;
    }

    #installBanner span {
      flex: 1;
      font-size: 0.85rem;
      color: #3c4a6e;
    }

    #installBtn {
      padding: 6px 14px;
      background: #5a67d8;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    #installDismiss {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.82rem;
      color: #718096;
      text-align: center;
      margin-bottom: 28px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 24px 20px;
      width: 100%;
      max-width: 480px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea#seqInput {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      font-size: 0.9rem;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
      background: #f7fafc;
      resize: none;
      overflow: hidden;
      line-height: 1.5;
      min-height: 42px;
    }

    textarea#seqInput:focus {
      border-color: #5a67d8;
      background: #fff;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button#calcBtn {
      padding: 10px 24px;
      background: #5a67d8;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button#calcBtn:active { opacity: 0.75; }

    button#resetBtn {
      padding: 10px 20px;
      background: #fff;
      color: #4a5568;
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid #cbd5e0;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button#resetBtn:active { opacity: 0.65; }

    .hint {
      font-size: 0.75rem;
      color: #a0aec0;
      margin-top: 8px;
    }

    .error {
      font-size: 0.85rem;
      color: #e53e3e;
      margin-top: 10px;
      display: none;
    }

    /* ---------- Result ---------- */
    #result {
      margin-top: 28px;
      display: none;
    }

    .result-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 10px;
    }

    /* 結果サマリ */
    .summary-box {
      background: #ebf4ff;
      border-left: 4px solid #5a67d8;
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
    }

    .summary-label {
      font-size: 0.8rem;
      color: #4a5568;
    }

    .summary-length {
      font-size: 1.1rem;
      font-weight: 800;
      color: #97266d;
      margin-left: 6px;
    }

    /* 数列表示 */
    .seq-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px;
      margin-top: 12px;
    }

    .num-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 20px;
      padding: 0 3px;
      border-radius: 3px;
      font-size: 0.9rem;
      font-weight: 600;
      background: #e2e8f0;
      color: #718096;
    }

    .num-chip.lis {
      background: #97266d;
      color: #fff;
    }

    /* 入力値の確認表示 */
    .input-display {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 0.9rem;
      color: #4a5568;
      margin-bottom: 16px;
    }

    /* 結果が古い（未再計算）状態 */
    #result.stale {
      opacity: 0.35;
      pointer-events: none;
    }

    .hint code {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 0.8rem;
      color: inherit;
    }
  </style>
</head>
<body>

<div id="installBanner">
  <span>ホーム画面に追加するとオフラインでも使えます</span>
  <button id="installBtn">追加</button>
  <button id="installDismiss" aria-label="閉じる">✕</button>
</div>

<h1>最長増加部分列</h1>
<p class="subtitle">Longest Increasing Subsequence</p>

<div class="card">
  <p class="hint" style="margin-bottom:8px;">例：<code>13,47,27,41,19,58,63,76,88</code></p>
  <div class="input-row">
    <textarea
      id="seqInput"
      inputmode="decimal"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      rows="1"
    ></textarea>
    <div class="btn-row">
      <button id="calcBtn" tabindex="2" onclick="calculate()">計算</button>
      <button id="resetBtn" tabindex="3" onclick="resetAll()">リセット</button>
    </div>
  </div>
  <p class="error" id="errorMsg"></p>

  <!-- Result -->
  <div id="result">
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:20px 0 18px;">
    <div class="summary-box">
      <span class="summary-label">最長増加部分列の長さ：</span><span class="summary-length" id="lisLength">0</span>
      <div class="seq-wrap" id="seqDisplay"></div>
    </div>
  </div>
</div>

<script>
  // Service Worker 登録
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // インストールバナー
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });
  document.getElementById('installDismiss').addEventListener('click', () => {
    document.getElementById('installBanner').style.display = 'none';
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').style.display = 'none';
  });

  const seqInput = document.getElementById('seqInput');
  const resultDiv = document.getElementById('result');

  // フォーカス時に全選択
  seqInput.addEventListener('focus', () => seqInput.select());

  // 入力変更時: auto-resize + stale 状態に
  seqInput.addEventListener('input', () => {
    seqInput.style.height = 'auto';
    seqInput.style.height = seqInput.scrollHeight + 'px';
    if (resultDiv.style.display !== 'none') {
      resultDiv.classList.add('stale');
    }
  });

  // Enter キーで計算（改行は挿入しない）
  seqInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); calculate(); }
  });

  function resetAll() {
    seqInput.value = '';
    seqInput.style.height = 'auto';
    resultDiv.style.display = 'none';
    resultDiv.classList.remove('stale');
    document.getElementById('errorMsg').style.display = 'none';
    seqInput.focus();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    resultDiv.style.display = 'none';
    resultDiv.classList.remove('stale');
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  function calculate() {
    hideError();

    const raw = document.getElementById('seqInput').value.trim();
    if (!raw) { showError('数列を入力してください。'); return; }

    const parts = raw.split(/[\s,，、]+/).filter(s => s !== '');
    const nums = parts.map(s => {
      const n = parseInt(s, 10);
      return isNaN(n) ? null : n;
    });

    if (nums.includes(null)) { showError('数値として読めない値が含まれています。'); return; }
    if (nums.length === 0) { showError('数列を入力してください。'); return; }

    // ---------- LIS (O(n^2) DP + 全解列挙) ----------
    const n = nums.length;
    const dp = new Array(n).fill(1);       // dp[i] = nums[i] で終わる LIS の長さ
    const prev = new Array(n).fill(-1);    // 経路復元用

    for (let i = 1; i < n; i++) {
      for (let j = 0; j < i; j++) {
        if (nums[j] < nums[i] && dp[j] + 1 > dp[i]) {
          dp[i] = dp[j] + 1;
          prev[i] = j;
        }
      }
    }

    const maxLen = Math.max(...dp);

    // 全ての LIS を列挙（最大 20 件まで）
    const MAX_SOLUTIONS = 20;
    const allLIS = [];

    function backtrack(idx, seq) {
      if (allLIS.length >= MAX_SOLUTIONS) return;
      seq.push(idx);
      if (dp[idx] === 1) {
        allLIS.push([...seq].reverse());
      } else {
        for (let j = 0; j < idx; j++) {
          if (nums[j] < nums[idx] && dp[j] === dp[idx] - 1) {
            backtrack(j, seq);
            if (allLIS.length >= MAX_SOLUTIONS) break;
          }
        }
      }
      seq.pop();
    }

    for (let i = 0; i < n; i++) {
      if (dp[i] === maxLen) {
        backtrack(i, []);
        if (allLIS.length >= MAX_SOLUTIONS) break;
      }
    }

    // 重複除去（インデックス列として比較）
    const uniqueLIS = [];
    const seen = new Set();
    for (const sol of allLIS) {
      const key = sol.join(',');
      if (!seen.has(key)) { seen.add(key); uniqueLIS.push(sol); }
    }

    const primarySolution = uniqueLIS[0];
    const primarySet = new Set(primarySolution);

    // ---------- 描画 ----------
    resultDiv.classList.remove('stale');
    document.getElementById('lisLength').textContent = maxLen;

    // 数列チップ
    const seqDisplay = document.getElementById('seqDisplay');
    seqDisplay.innerHTML = '';
    nums.forEach((v, i) => {
      const chip = document.createElement('div');
      chip.className = 'num-chip' + (primarySet.has(i) ? ' lis' : '');
      chip.textContent = v;
      seqDisplay.appendChild(chip);
    });

    resultDiv.style.display = 'block';
  }
</script>
</body>
</html>
